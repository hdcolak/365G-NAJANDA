services:
  - type: web
    name: voyage-kundu-ops
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: voyage-kundu-api
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: voyage-kundu-api
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run server:start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        fromDatabase:
          name: voyage-kundu-db
          property: connectionString

databases:
  - name: voyage-kundu-db
    plan: starter
    databaseName: voyage_kundu
    user: voyage_kundu
